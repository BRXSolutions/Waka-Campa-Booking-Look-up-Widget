<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">
  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:24px;"><strong>Waka Campa Agent Login</strong></h2>
    <p style="margin:0;font-size:16px;">Enter your credentials to access the dashboard</p>
  </div>

  <div id="login-form">
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;color:#000;">Username</label>
      <input id="username-input" type="text" placeholder="e.g. john.doe" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;">
    </div>
    <div style="margin-bottom:25px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;color:#000;">Password</label>
      <input id="password-input" type="password" placeholder="Enter your password" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;">
    </div>
    <button id="login-btn" type="button" style="width:100%;padding:15px;background:radial-gradient( circle 300px at 50% 70%, #444, #000 );color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;font-family:'DM Sans',Arial,sans-serif;">
      Login
    </button>
  </div>

  <div id="loading-login" style="display:none;padding:20px;text-align:center;color:#000;font-family:'DM Sans',Arial,sans-serif;">🔐 Verifying credentials...</div>
  <div id="error-login" style="display:none;color:#ef4444;text-align:center;padding:20px;font-family:'DM Sans',Arial,sans-serif;"></div>
</div>

<script>
document.getElementById('login-btn').onclick = async function(e) {
  e.preventDefault();

  const username = document.getElementById('username-input').value.trim();
  const password = document.getElementById('password-input').value.trim();

  if (!username || !password) {
    showLoginError('Please enter both username and password');
    return;
  }

  document.getElementById('login-form').style.display = 'none';
  document.getElementById('loading-login').style.display = 'block';

  try {
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/jpv8080Nl1E8ooQ5YY2gc/sync', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });

    let result;
    if (response.status === 204) {
      result = { success: false, message: 'Invalid credentials' };
    } else {
      result = await response.json();
    }

    if (result.success && result.agentName) {
      localStorage.setItem('agentName', result.agentName);
      localStorage.setItem('isLoggedIn', 'true');
      window.location.href = 'https://brxsolutions.github.io/Campervan-rental/home-page.html';
    } else {
      showLoginError(result.message || 'Invalid username or password');
    }
  } catch(error) {
    showLoginError('Connection error - try again');
    console.error('Login error:', error);
  }
};

function showLoginError(message) {
  document.getElementById('loading-login').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('error-login').style.display = 'block';
  document.getElementById('error-login').innerHTML = `
    <div style="font-size:18px;margin-bottom:10px;">❌ ${message}</div>
    <button onclick="location.reload();" style="padding:10px 20px;background:radial-gradient( circle 80px at 50% 70%, #444, #000 );color:#fff;border:2px solid #fff;border-radius:6px;font-family:'DM Sans',Arial,sans-serif;">
      Try Again
    </button>
  `;
}

if (localStorage.getItem('isLoggedIn') === 'true') {
  window.location.href = 'https://brxsolutions.github.io/Campervan-rental/home-page.html';
}
</script>

}
