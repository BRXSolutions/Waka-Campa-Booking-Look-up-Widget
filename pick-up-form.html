<script> 
let currentBookingNum = '';
let currentLastName = '';

document.getElementById('verify-btn').onclick = async function(e) { 
  e.preventDefault(); 
  currentBookingNum = document.getElementById('booking-input').value.trim(); 
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase(); 
  
  if (!currentBookingNum || !currentLastName) { 
    document.getElementById('error').innerHTML = 'Please enter both fields'; 
    document.getElementById('error').style.display = 'block'; 
    document.getElementById('form-section').style.display = 'block'; 
    return; 
  } 
  document.getElementById('form-section').style.display = 'none'; 
  document.getElementById('loading').style.display = 'block'; 

  try { 
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/PWGPbbTKKaJUE470aVwLy/sync', { 
      method: 'POST', 
      headers: {'Content-Type': 'application/json'}, 
      body: JSON.stringify({bookingNum: currentBookingNum, lastName: currentLastName}) 
    }); 

    let result; 
    if (response.status === 204) { 
      result = { success: false, message: 'Booking not found' }; 
    } else { 
      result = await response.json(); 
    } 

    if (result.success && result.data) { 
      const data = result.data; 

      document.getElementById('loading').style.display = 'none'; 
      document.getElementById('booking-details').style.display = 'block'; 
      
      // ✅ YOUR ORIGINAL BOOKING UI (UNCHANGED)
      let html = `<div style="background:#fff;color:#000;padding:30px;border-radius:20px;text-align:left;box-shadow:0 20px 40px rgba(0,0,0,0.2);font-family:'DM Sans',Arial,sans-serif;">
        <h2 style="margin:0 0 20px 0;text-align:center"><strong>Booking # ${data.bookingNum || 'N/A'}</strong></h2>
        <div style="border-bottom:1px solid #ddd;margin:0 0 20px 0;"></div>
        <div style="margin-bottom:20px;">
          <h4><strong><u>Booking Details</u></strong></h4>
          <div>
            <div><strong>Status:</strong> ${data.reservationStatus || 'N/A'}</div>
            <div><strong>Number of Days:</strong> ${data.numberOfDays || 'N/A'}</div>
            <div><strong>Pickup Date:</strong> ${data.pickupDate || 'N/A'}</div>
            <div><strong>Pickup Time:</strong> ${data.pickupTime || 'N/A'}</div>
            <div><strong>Pickup Location:</strong> ${data.pickupLocation || 'N/A'}</div>
            <div><strong>Dropoff Date:</strong> ${data.dropoffDate || 'N/A'}</div>
            <div><strong>Dropoff Time:</strong> ${data.dropoffTime || 'N/A'}</div>
            <div><strong>Dropoff Location:</strong> ${data.dropoffLocation || 'N/A'}</div>
            <div><strong>Total Cost:</strong> ${data.totalCost || 'N/A'}</div>
            <div><strong>Balance Due:</strong> ${data.totalBalanceDue || 'N/A'}</div>
          </div>
        </div>
      </div>`;

      document.getElementById('booking-details').innerHTML = html;

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <button onclick="handleDetailsCorrect()">✓ Details are correct</button>
        <button onclick="resetForm()">✗ Incorrect</button>
      `;

    } else { 
      throw new Error();
    }

  } catch(error) { 
    document.getElementById('loading').style.display = 'none'; 
    document.getElementById('error').style.display = 'block'; 
    document.getElementById('error').innerHTML = '❌ Booking not found'; 
  } 
}; 

// ✅ ONLY THIS PART UPDATED
function handleDetailsCorrect() {
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';

  const container = document.getElementById('survey-iframe');

  container.innerHTML = `
    <iframe 
      src="https://api.leadconnectorhq.com/widget/survey/hguGjV9kDYPzFtYLdtUI?booking_number=${encodeURIComponent(currentBookingNum)}&last_name=${encodeURIComponent(currentLastName)}"
      style="border:none;width:100%;height:${window.innerWidth < 600 ? '80vh' : '600px'};"
      scrolling="no"
      id="surveyFrame"
      title="survey">
    </iframe>
  `;

  container.style.display = 'block';

  if (!document.querySelector('script[src="https://link.msgsndr.com/js/form_embed.js"]')) {
    const script = document.createElement('script');
    script.src = 'https://link.msgsndr.com/js/form_embed.js';
    document.body.appendChild(script);
  }

  // Detect submission
  let loadedOnce = false;

  document.getElementById('surveyFrame').addEventListener('load', () => {
    if (loadedOnce) {
      showThankYouScreen();
    }
    loadedOnce = true;
  });
}

// ✅ NEW
function showThankYouScreen() {
  const container = document.getElementById('survey-iframe');

  let countdown = 3;

  container.innerHTML = `
    <div style="text-align:center;padding:40px;">
      <h2>✅ Submission Successful</h2>
      <p>Thank you! You're all set.</p>
      <p>Redirecting in <span id="countdown">${countdown}</span>...</p>
    </div>
  `;

  const interval = setInterval(() => {
    countdown--;
    document.getElementById('countdown').innerText = countdown;

    if (countdown <= 0) {
      clearInterval(interval);
      resetForm();
    }
  }, 1000);
}

function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('survey-iframe').style.display = 'none';
  document.getElementById('loading').style.display = 'none';

  currentBookingNum = '';
  currentLastName = '';
}
</script>
