<!-- OUTER WRAPPER FOR CENTERING -->
<div style="
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f5f5;
  padding:15px;
">

<!-- MAIN CONTAINER -->
<div style="width:100%;max-width:500px;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;"> 

  <div style="text-align:center;margin-bottom:30px;"> 
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Drive Safe Guide and Camper Van Onboarding Form</strong></h2> 
    <p style="margin:0;font-size:16px;">Mandatory Pre-hire Task</p> 
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div> 

  <div id="form-section"> 
    <div style="margin-bottom:20px;"> 
      <p style="margin-bottom:15px;font-size:16px;text-align:center;"><strong>Please enter reservation details</strong></p> 
      <label style="display:block;margin-bottom:5px;color:#000;">Booking Number</label> 
      <input id="booking-input" type="text" placeholder="e.g. 4020" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;"> 
    </div> 

    <div style="margin-bottom:25px;"> 
      <label style="display:block;margin-bottom:5px;color:#000;">Last Name</label> 
      <input id="lastname-input" type="text" placeholder="e.g. Lucero" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;"> 
    </div> 

    <button id="verify-btn" type="button" style="width:100%;padding:15px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;font-family:'DM Sans',Arial,sans-serif;">Submit</button> 
  </div> 

  <div id="loading" style="display:none;padding:20px;text-align:center;color:#000;">🔍 Searching Reservation....</div> 
  <div id="booking-details" style="display:none;"></div> 
  <div id="confirmation-buttons" style="display:none;padding:20px;text-align:center;"></div>
  <div id="survey-iframe" style="display:none;width:100%;border:none;"></div>
  <div id="error" style="display:none;color:#ef4444;text-align:center;padding:20px;"></div> 

</div>
</div>

<script> 
let currentBookingNum = '';
let currentLastName = '';

document.getElementById('verify-btn').onclick = async function(e) { 
  e.preventDefault(); 
  currentBookingNum = document.getElementById('booking-input').value.trim(); 
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase(); 
  
  if (!currentBookingNum || !currentLastName) { 
    document.getElementById('error').innerHTML = 'Please enter both fields'; 
    document.getElementById('error').style.display = 'block'; 
    return; 
  } 

  document.getElementById('form-section').style.display = 'none'; 
  document.getElementById('loading').style.display = 'block'; 

  try { 
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/PWGPbbTKKaJUE470aVwLy/sync', { 
      method: 'POST', 
      headers: {'Content-Type': 'application/json'}, 
      body: JSON.stringify({bookingNum: currentBookingNum, lastName: currentLastName}) 
    }); 

    let result = response.status === 204 
      ? { success: false, message: 'Booking not found' } 
      : await response.json(); 

    if (result.success && result.data) { 
      const data = result.data; 

      document.getElementById('loading').style.display = 'none'; 
      document.getElementById('booking-details').style.display = 'block'; 

      let html = `<div style="background:#fff;padding:30px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);">
        <h2 style="text-align:center;margin-bottom:20px;"><strong>Booking # ${data.bookingNum}</strong></h2>
        <div style="border-bottom:1px solid #ddd;margin-bottom:20px;"></div>
        <div><strong>Status:</strong> ${data.reservationStatus}</div>
        <div><strong>Pickup:</strong> ${data.pickupDate} ${data.pickupTime}</div>
        <div><strong>Dropoff:</strong> ${data.dropoffDate} ${data.dropoffTime}</div>
        <div><strong>Total:</strong> ${data.totalCost}</div>
      </div>`;

      document.getElementById('booking-details').innerHTML = html;

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <button onclick="handleDetailsCorrect()" style="width:48%;padding:12px;background:#16a34a;color:#fff;border-radius:8px;margin-right:4%;">✓ Correct</button>
        <button onclick="resetForm()" style="width:48%;padding:12px;background:#dc2626;color:#fff;border-radius:8px;">✗ Incorrect</button>
      `;

    } else { 
      throw new Error('Booking not found');
    }

  } catch(error) { 
    document.getElementById('loading').style.display = 'none'; 
    document.getElementById('error').style.display = 'block'; 
    document.getElementById('error').innerHTML = '❌ Error - try again'; 
  } 
}; 

function handleDetailsCorrect() {
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';

  const iframe = document.createElement('iframe');
  iframe.src = `https://api.leadconnectorhq.com/widget/survey/hguGjV9kDYPzFtYLdtUI?booking_number=${currentBookingNum}&last_name=${currentLastName}`;
  iframe.style.width = '100%';
  iframe.style.height = window.innerWidth < 600 ? '80vh' : '600px';
  iframe.style.border = 'none';

  document.getElementById('survey-iframe').innerHTML = '';
  document.getElementById('survey-iframe').appendChild(iframe);
  document.getElementById('survey-iframe').style.display = 'block';
}

function resetForm() {
  location.reload();
}
</script> 

<style> 
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap'); 

@media (max-width: 600px) {
  input {
    font-size:18px !important;
    padding:14px !important;
  }

  button {
    font-size:16px !important;
    padding:14px !important;
  }

  h2 {
    font-size:20px !important;
  }

  #booking-details {
    font-size:15px;
  }
}
</style>
